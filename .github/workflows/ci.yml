name: pipeline simple

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: recuperer code du depot
      uses: actions/checkout@v4 
    - name: installer python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Installer les dépendances
      run: 
          pip install flake8
    - name: installer les dependences
      run: pip install -r requirements.txt
    - name: lint
      run: |
        flake8 app tests --count --select=E9,F63,F7,F82,F841 --show-source --statistics
        flake8 app tests --count --max-complexity=10 --max-line-length=127 --statistics
        flake8 tests app --count --max-line-length=127 --statistics
  
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Installer les dépendances
        run: 
          pip install flake8
      - name: installer les dependences
        run: pip install -r requirements.txt
      - name: executer pytest
        run: python -m pytest tests/ -v --cov=app

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
     - name: Générer le package
       run:
          python -m build
     -  name: installer les dependences
        run: pip install -r requirements.txt
     - name: Upload artifact
       uses: actions/upload-artifact@v6

    

     
  
  
