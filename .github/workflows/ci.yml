name: pipeline simple

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: recuperer test
      uses: actions/checkout@v4 
    - name: installer python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Installer les dépendances
      run: 
          pip install flake8
    - name: installer les dependences
      run: pip install -r requirements.txt
    - name: lint
      run: |
        flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
        flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
        flake8 tests --count --max-line-length=127 --statistics
    - name: lancement 
      run: PYTHONPATH=. pytest -v --cov=app

     
  
  
